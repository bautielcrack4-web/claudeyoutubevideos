# Matcher CLIP distribuido GRATIS en GitHub Actions (repo PÚBLICO).
# Reparte los beats del match list en N runners en paralelo; cada uno baja proxies
# 240p de los candidatos de YouTube, puntúa los frames con CLIP local (transformers.js)
# y elige el clip+segundo que mejor MUESTRA el concepto. El agregador une todo en
# clips_<slug>_matched.json (artifact descargable). NO usa tu PC ni tokens de Claude.
#
# El match list viaja como RELEASE asset "match-<slug>" (match_<slug>.json), subido
# por el orquestador scripts/matchfarm.mjs. El CÓDIGO (match_runner.mjs) está en el repo.
#
# Disparo:  gh workflow run match.yml -f slug=estiercol -f chunks=20
name: match

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "slug del video (ej: estiercol)"
        required: true
      chunks:
        description: "en cuantos runners repartir"
        required: false
        default: "20"
      nowm:
        description: "1 = rechazar clips con marca de agua/logo (NO_WATERMARK)"
        required: false
        default: "0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          N=${{ github.event.inputs.chunks }}
          LIST=$(node -e "console.log(JSON.stringify(Array.from({length:$N},(_,i)=>i)))")
          echo "matrix=$LIST" >> "$GITHUB_OUTPUT"
      # PREFETCH del modelo CLIP UNA sola vez (los 20 shards lo bajaban a la vez de HF
      # → rate-limit → fallaban). Acá se baja 1 vez y se cachea; los shards lo restauran.
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: install deps (solo si no hay cache)
        if: steps.nm.outputs.cache-hit != 'true'
        run: |
          n=0; until npm ci; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; rm -rf node_modules; sleep 20; done
      - name: cache modelo CLIP
        uses: actions/cache@v4
        with:
          path: .cache
          key: clipmodel-clip-vit-base-patch32
      - name: prefetch modelo CLIP (1 vez, evita rate-limit de HF en los 20 shards)
        run: |
          node -e "import('@huggingface/transformers').then(async t=>{await t.pipeline('zero-shot-image-classification','Xenova/clip-vit-base-patch32',{dtype:'q8'});console.log('modelo CLIP cacheado');}).catch(e=>{console.error(e);process.exit(1)})"

  match:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idx: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # CACHE node_modules (incluye el binario de onnxruntime-node) → evita el npm ci
      # lento+flaky (~2-3 min). Cache hit = restaura en ~15s. Se puebla en el 1er run.
      - name: cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: install deps (solo si no hay cache)
        if: steps.nm.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm ci falló tras $n intentos"; exit 1; fi
            echo "npm ci reintento $n…"; rm -rf node_modules; sleep 20
          done
      # CACHE del modelo CLIP (transformers.js lo baja a ./.cache) → evita re-descargarlo
      - name: cache modelo CLIP
        uses: actions/cache@v4
        with:
          path: .cache
          key: clipmodel-${{ env.CLIP_MODEL || 'clip-vit-base-patch32' }}
      # CACHE de yt-dlp + ffmpeg estático → evita el apt-get (~40s) y el curl cada vez
      - name: cache yt-dlp + ffmpeg
        id: bin
        uses: actions/cache@v4
        with:
          path: ~/bincache
          key: ytffmpeg-v1
      - name: install yt-dlp + ffmpeg
        run: |
          mkdir -p ~/bincache
          if [ ! -f ~/bincache/yt-dlp ]; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/bincache/yt-dlp
            chmod a+rx ~/bincache/yt-dlp
          fi
          sudo cp ~/bincache/yt-dlp /usr/local/bin/yt-dlp
          if [ ! -f ~/bincache/ffmpeg ]; then
            curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o /tmp/ff.tar.xz
            tar -xf /tmp/ff.tar.xz -C /tmp
            cp /tmp/ffmpeg-*-static/ffmpeg ~/bincache/ffmpeg
            chmod a+rx ~/bincache/ffmpeg
          fi
          sudo cp ~/bincache/ffmpeg /usr/local/bin/ffmpeg
      - name: download match list
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release download "match-${{ github.event.inputs.slug }}" \
            --pattern "match_${{ github.event.inputs.slug }}.json" --dir .
      - name: inject proxies (esquiva el bloqueo de IPs de GitHub en YouTube)
        env:
          YTPROXIES: ${{ secrets.YTPROXIES }}
        run: |
          mkdir -p cookies
          printf '%s\n' "$YTPROXIES" > cookies/proxies.txt
          echo "proxies inyectados: $(grep -c @ cookies/proxies.txt)"
      - name: match shard
        env:
          MATCH_CANDS: "2"
          MATCH_MAXSPAN: "90"
          MATCH_COARSE: "22"
          MATCH_POOL: "10"
          NO_WATERMARK: "${{ github.event.inputs.nowm }}"
        run: node scripts/match_runner.mjs "${{ github.event.inputs.slug }}" ${{ matrix.idx }} ${{ github.event.inputs.chunks }} "match_${{ github.event.inputs.slug }}.json"
      - uses: actions/upload-artifact@v4
        with:
          name: matchpart-${{ matrix.idx }}
          path: out/match_part_${{ matrix.idx }}.json
          retention-days: 3

  aggregate:
    needs: match
    if: ${{ always() }}   # mergea lo que haya, aunque algún shard falle (no perder todo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: parts
          pattern: "matchpart-*"
          merge-multiple: true
      - name: merge
        run: node scripts/match_merge.mjs "${{ github.event.inputs.slug }}" parts
      - uses: actions/upload-artifact@v4
        with:
          name: matched-${{ github.event.inputs.slug }}
          path: clips_${{ github.event.inputs.slug }}_matched.json
          retention-days: 7
