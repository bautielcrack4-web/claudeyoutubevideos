# Render distribuido GRATIS en GitHub Actions (repo PÚBLICO = minutos ilimitados).
# Parte el video en N rangos de frames, los renderiza en paralelo (matrix), y une
# todo con ffmpeg. Entrega el mp4 final como ARTIFACT descargable (NO sube a YouTube).
#
# Assets: el orquestador sube un tarball como RELEASE asset "assets-<slug>" (avatar
# _opt.mp4 + .wav + img/ + vid/). Cada job de render lo baja y extrae a public/.
# El CÓDIGO (Main_<slug>.tsx, cues, componentes) ya está en el repo.
#
# Disparo manual o por API:
#   gh workflow run render.yml -f slug=fly -f comp_id=Fly -f total_frames=43380 -f chunks=24
name: render

on:
  workflow_dispatch:
    inputs:
      slug:        { description: "slug del video (ej: fly)", required: true }
      comp_id:     { description: "id de composicion Remotion (ej: Fly)", required: true }
      total_frames: { description: "frames totales (ej: 43380)", required: true }
      chunks:      { description: "en cuantos pedazos partir", required: false, default: "24" }

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          N=${{ github.event.inputs.chunks }}
          LIST=$(node -e "console.log(JSON.stringify(Array.from({length:$N},(_,i)=>i)))")
          echo "matrix=$LIST" >> "$GITHUB_OUTPUT"

  render:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idx: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: install deps (retry — onnxruntime-node a veces tira ETIMEDOUT)
        run: |
          n=0
          until npm ci; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm ci falló tras $n intentos"; exit 1; fi
            echo "npm ci reintento $n…"; rm -rf node_modules; sleep 20
          done
          # PARCHE bug npm optional-deps: el binding nativo de rspack (bundler de
          # Remotion) a veces NO se instala → "Cannot find native binding". Lo
          # forzamos explícito para el runner linux-x64; idempotente si ya está.
          if ! node -e "require('@rspack/binding')" 2>/dev/null; then
            RV=$(node -p "require('@rspack/binding/package.json').version" 2>/dev/null || echo "")
            echo "rspack binding ausente — instalando linux-x64-gnu@${RV}…"
            npm i -D "@rspack/binding-linux-x64-gnu@${RV}" --no-save --force || true
          fi
      # bajar y extraer los assets (release asset subido por el orquestador)
      - name: download assets
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release download "assets-${{ github.event.inputs.slug }}" \
            --pattern "assets-${{ github.event.inputs.slug }}.tar" --dir .
          mkdir -p public
          tar -xf "assets-${{ github.event.inputs.slug }}.tar" -C public
      # calcular el rango de frames de este pedazo
      - name: frame range
        id: r
        run: node scripts/chunkmath.mjs ${{ github.event.inputs.total_frames }} ${{ github.event.inputs.chunks }} ${{ matrix.idx }} >> "$GITHUB_OUTPUT"
      - name: render chunk
        run: |
          mkdir -p out
          TMPDIR=/dev/shm npx remotion render "${{ github.event.inputs.comp_id }}" \
            "out/chunk_${{ matrix.idx }}.mp4" \
            --frames=${{ steps.r.outputs.start }}-${{ steps.r.outputs.end }} \
            --concurrency=4 --timeout=120000 --crf=23
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.idx }}
          path: out/chunk_${{ matrix.idx }}.mp4
          retention-days: 3

  stitch:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: chunks, pattern: "chunk-*", merge-multiple: true }
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # ordenar por indice y concatenar (todos comparten codec → -c copy, sin recodificar)
      - name: concat
        run: |
          ls chunks
          for i in $(seq 0 $(( ${{ github.event.inputs.chunks }} - 1 ))); do
            echo "file '$PWD/chunks/chunk_$i.mp4'" >> list.txt
          done
          cat list.txt
          ffmpeg -y -f concat -safe 0 -i list.txt -c copy "${{ github.event.inputs.slug }}.mp4"
      - uses: actions/upload-artifact@v4
        with:
          name: final-${{ github.event.inputs.slug }}
          path: ${{ github.event.inputs.slug }}.mp4
          retention-days: 7
