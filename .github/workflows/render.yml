# Render distribuido GRATIS en GitHub Actions (repo PÚBLICO = minutos ilimitados).
# Parte el video en N rangos de frames, los renderiza en paralelo (matrix), y une con ffmpeg.
# MEJORAS (Bagasy): caché de deps+chromium (npm ci vuela), barra de progreso por chunk a Supabase,
# chunks persistidos + input only_chunks para RE-RENDER PARCIAL (solo los pedazos que cambiaron).
#
#   gh workflow run render.yml -f slug=fly -f comp_id=Fly -f total_frames=43380 -f chunks=24
#   (re-render parcial: agregar -f only_chunks=3  o  -f only_chunks=3,4  o  -f only_chunks=3-5)
name: render

on:
  workflow_dispatch:
    inputs:
      slug:        { description: "slug del video", required: true }
      comp_id:     { description: "id de composicion Remotion", required: true }
      total_frames: { description: "frames totales", required: true }
      chunks:      { description: "en cuantos pedazos partir", required: false, default: "24" }
      only_chunks: { description: "solo estos chunks (ej 3 | 3,4 | 3-5). vacio = todos", required: false, default: "" }

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          N=${{ github.event.inputs.chunks }}; ONLY="${{ github.event.inputs.only_chunks }}"
          if [ -n "$ONLY" ]; then
            LIST=$(node -e "const s=process.argv[1];const o=[];for(const p of s.split(',')){if(p.includes('-')){const[a,b]=p.split('-').map(Number);for(let i=a;i<=b;i++)o.push(i)}else o.push(+p)}console.log(JSON.stringify([...new Set(o)]))" "$ONLY")
          else
            LIST=$(node -e "console.log(JSON.stringify(Array.from({length:$N},(_,i)=>i)))")
          fi
          echo "matrix=$LIST" >> "$GITHUB_OUTPUT"
      - name: reset progreso (Bagasy)
        if: ${{ github.event.inputs.only_chunks == '' }}
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.SB_URL }}/rest/v1/rpc/render_reset" -H "apikey: ${{ secrets.SB_ANON }}" -H "Authorization: Bearer ${{ secrets.SB_ANON }}" -H "Content-Type: application/json" -d '{"p_slug":"${{ github.event.inputs.slug }}"}' || true

  render:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        idx: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: cache node_modules + chromium
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/remotion
            node_modules/.remotion
          key: rmn-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: rmn-${{ runner.os }}-
      - name: install deps (si no vinieron del cache)
        run: |
          if [ -d node_modules ] && node -e "require('@rspack/binding')" 2>/dev/null; then
            echo "deps cacheadas ✓ — salteo npm ci"
          else
            n=0
            until npm ci; do n=$((n+1)); [ "$n" -ge 4 ] && { echo "npm ci fallo tras $n"; exit 1; }; echo "npm ci reintento $n"; rm -rf node_modules; sleep 20; done
            if ! node -e "require('@rspack/binding')" 2>/dev/null; then
              RV=$(node -p "require('@rspack/binding/package.json').version" 2>/dev/null || echo "")
              echo "rspack binding ausente — instalando linux-x64-gnu@${RV}"
              npm i -D "@rspack/binding-linux-x64-gnu@${RV}" --no-save --force || true
            fi
          fi
      - name: download assets
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release download "assets-${{ github.event.inputs.slug }}" \
            --pattern "assets-${{ github.event.inputs.slug }}.tar" --dir .
          mkdir -p public
          tar -xf "assets-${{ github.event.inputs.slug }}.tar" -C public
      - name: frame range
        id: r
        run: node scripts/chunkmath.mjs ${{ github.event.inputs.total_frames }} ${{ github.event.inputs.chunks }} ${{ matrix.idx }} >> "$GITHUB_OUTPUT"
      - name: render chunk
        run: |
          mkdir -p out
          TMPDIR=/dev/shm npx remotion render "${{ github.event.inputs.comp_id }}" \
            "out/chunk_${{ matrix.idx }}.mp4" \
            --frames=${{ steps.r.outputs.start }}-${{ steps.r.outputs.end }} \
            --concurrency=4 --timeout=120000 --crf=23
      - name: reportar progreso del chunk (Bagasy)
        continue-on-error: true
        run: |
          DELTA=$(node -e "console.log(95/${{ github.event.inputs.chunks }})")
          curl -s -X POST "${{ secrets.SB_URL }}/rest/v1/rpc/render_bump" -H "apikey: ${{ secrets.SB_ANON }}" -H "Authorization: Bearer ${{ secrets.SB_ANON }}" -H "Content-Type: application/json" -d "{\"p_slug\":\"${{ github.event.inputs.slug }}\",\"p_delta\":$DELTA}" || true
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.idx }}
          path: out/chunk_${{ matrix.idx }}.mp4
          retention-days: 3

  stitch:
    needs: render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: chunks, pattern: "chunk-*", merge-multiple: true }
      - name: traer chunks persistidos (reusar los no-cambiados)
        continue-on-error: true
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release download "chunks-${{ github.event.inputs.slug }}" --dir prev --pattern "*.mp4" || true
          if [ -d prev ]; then cp -n prev/*.mp4 chunks/ 2>/dev/null || true; fi
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: concat (todos los N en orden)
        run: |
          ls chunks
          for i in $(seq 0 $(( ${{ github.event.inputs.chunks }} - 1 ))); do
            echo "file '$PWD/chunks/chunk_$i.mp4'" >> list.txt
          done
          cat list.txt
          ffmpeg -y -f concat -safe 0 -i list.txt -c copy "${{ github.event.inputs.slug }}.mp4"
      - uses: actions/upload-artifact@v4
        with:
          name: final-${{ github.event.inputs.slug }}
          path: ${{ github.event.inputs.slug }}.mp4
          retention-days: 7
      - name: persistir chunks (para re-render parcial)
        continue-on-error: true
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          cd chunks
          gh release delete "chunks-${{ github.event.inputs.slug }}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "chunks-${{ github.event.inputs.slug }}" chunk_*.mp4 --title "chunks-${{ github.event.inputs.slug }}" --notes "chunks para re-render parcial" || gh release upload "chunks-${{ github.event.inputs.slug }}" chunk_*.mp4 --clobber
      - name: progreso 100 (Bagasy)
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.SB_URL }}/rest/v1/rpc/render_bump" -H "apikey: ${{ secrets.SB_ANON }}" -H "Authorization: Bearer ${{ secrets.SB_ANON }}" -H "Content-Type: application/json" -d '{"p_slug":"${{ github.event.inputs.slug }}","p_delta":100}' || true
